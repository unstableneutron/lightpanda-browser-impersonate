name: Build curl-impersonate

on:
  push:
    branches: [curl-impersonate]
    paths:
      - 'vendor/curl-impersonate/**'
      - '.github/workflows/curl-impersonate-release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.5)'
        required: false
        default: ''

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            platform: linux
          - os: ubuntu-22.04-arm
            arch: aarch64
            platform: linux
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build golang \
            autoconf automake libtool \
            libzstd-dev zstd \
            pkg-config

      - name: Build curl-impersonate
        run: make install-curl-impersonate

      - name: Package artifacts
        run: |
          cd vendor/curl-impersonate/out/${{ matrix.platform }}-${{ matrix.arch }}
          tar -czvf curl-impersonate-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz lib include
          mv curl-impersonate-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz ${{ github.workspace }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curl-impersonate-${{ matrix.platform }}-${{ matrix.arch }}
          path: curl-impersonate-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get curl-impersonate version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            cd vendor/curl-impersonate
            VERSION=$(git describe --tags 2>/dev/null || git rev-parse --short HEAD)
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          ls -la release/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: curl-impersonate-${{ steps.version.outputs.version }}
          name: curl-impersonate ${{ steps.version.outputs.version }}
          body: |
            Pre-built curl-impersonate static libraries with patched headers.
            
            Based on [curl-impersonate ${{ steps.version.outputs.version }}](https://github.com/lexiforest/curl-impersonate).
            
            ## Included files
            - `lib/` - Static libraries (libcurl-impersonate.a, libssl.a, libcrypto.a, etc.)
            - `include/` - Patched headers (curl/, openssl/)
            
            ## Usage
            ```bash
            make download-curl-impersonate
            ```
          files: release/*
          draft: false
          prerelease: false

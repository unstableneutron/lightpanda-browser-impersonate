name: Nix Cache

on:
  push:
    branches: [main, curl-impersonate]
    paths:
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  cache:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-22.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: lightpanda-browser-impersonate
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build and cache dev shell
        run: nix develop --command echo "Dev shell cached for ${{ matrix.system }}"
